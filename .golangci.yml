version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - rowserrcheck
    - sqlclosecheck
    - testifylint
  exclusions:
    generated: strict
    paths:
      - internal/pb
      - internal/db/sqlc
      - docs/docs.go
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - bitedash
