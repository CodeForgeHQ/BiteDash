version: "1"

packages:
  - name: db                       # Имя Go-пакета
    path: internal/db/sqlc          # Куда генерировать Go-код
    engine: postgresql              # Тип БД
    schema:
      - internal/db/migrations/*.up.sql   # Файлы миграций
    queries:
      - internal/db/query/*.sql          # SQL-запросы
    emit_json_tags: true                 # Генерация json тегов
    emit_prepared_queries: false         # Использовать prepared queries
    emit_interface: true                 # Генерация интерфейса для тестов/моков
    overrides:
      - db_type: "uuid"                  # Переопределяем тип uuid
        go_type: "github.com/google/uuid.UUID"