syntax = "proto3";

package bitedash.v1;

option go_package = "internal/pb/bitedash/v1;bitedashv1";

service OrderService {
  rpc Checkout(CheckoutRequest) returns (CheckoutResponse);
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListMyOrdersResponse);
  rpc GetOrderByID(GetOrderByIDRequest) returns (GetOrderByIDResponse);
  rpc WatchOrderStatus(WatchOrderStatusRequest) returns (stream OrderStatusEvent);
}

message CheckoutRequest {}

message CheckoutResponse {
  string order_id = 1;
  string status = 2;
  double total_amount = 3;
  int32 items_count = 4;
}

message ListMyOrdersRequest {}

message ListMyOrdersResponse {
  repeated Order orders = 1;
}

message GetOrderByIDRequest {
  string order_id = 1;
}

message GetOrderByIDResponse {
  Order order = 1;
}

message Order {
  string id = 1;
  string status = 2;
  double total_amount = 3;
  string created_at = 4;
  repeated OrderItem items = 5;
}

message OrderItem {
  string product_id = 1;
  string product_name = 2;
  double unit_price = 3;
  int32 quantity = 4;
  double line_total = 5;
}

message WatchOrderStatusRequest {
  string order_id = 1;
}

message OrderStatusEvent {
  string order_id = 1;
  string status = 2;
  string message = 3;
  string occurred_at = 4;
}